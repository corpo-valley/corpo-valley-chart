apiVersion: v2
name: corpo-valley
description: |
  Corpo Valley platform — a parameterized Helm chart for the single-tenant
  platform that abstracts code + infra so non-technical users can drive Claude
  Code safely. Renders the Ory identity stack, the portal, Gitea, dual ArgoCD,
  registry, MCP gateway, and the per-project bounds (VAPs / AppProjects /
  NetworkPolicies).

  Platform images are built from github.com/corpo-valley/corpo-valley-main and
  published to ghcr.io/corpo-valley/corpo-valley-*. This chart references them
  via values but does not require any source from the build repo.

  Phase 1 ships `role: all-in-one` — one cluster, single platform instance.
  The `role: platform` / `role: tenants` modes are scaffolded for a future
  platform/tenants cluster split but are not yet rendered by this version.

type: application
version: 0.6.2
appVersion: "v0.2.0"

home: https://github.com/corpo-valley/corpo-valley-main
sources:
  - https://github.com/corpo-valley/corpo-valley-main
  - https://github.com/corpo-valley/corpo-valley-chart

maintainers:
  - name: corpo-valley
    url: https://github.com/corpo-valley

keywords:
  - ory
  - kratos
  - hydra
  - argocd
  - gitops
  - mcp
  - claude-code

annotations:
  artifacthub.io/changes: |
    - kind: fixed
      description: cluster.sealedSecretsControllerUrl default no longer includes the /v1/cert.pem path — the portal appends that itself, so the baked-in suffix produced a doubled path and broke project secret sealing
    - kind: fixed
      description: ory-postgres StatefulSet now sets podManagementPolicy explicitly to OrderedReady (the Kubernetes-persisted default) so it never differs literally from a pre-chart object — removing one of the two immutable-field mismatches that blocked adopting an existing deployment under GitOps
    - kind: added
      description: storage.oryPostgresClassName overrides the StorageClass on the ory-postgres volume (unset inherits storage.className, set-but-empty omits the field so the cluster default binds) — lets an adopted, pre-chart ory-postgres render a volumeClaimTemplate matching its existing (immutable) volumes
    - kind: added
      description: README "Adopting an existing deployment" section documents the StatefulSet immutable-field caveat and the ArgoCD ignoreDifferences + RespectIgnoreDifferences=true backstop
