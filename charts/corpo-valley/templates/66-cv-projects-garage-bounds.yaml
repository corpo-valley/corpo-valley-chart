{{/*
  Per-project Garage bounds. Fires only on StatefulSets labeled
  corpo-valley.com/managed=garage (set by the projects-argocd controller).
  All rules live in the shared cv.capabilityBounds helper (_helpers.tpl) so
  Garage and Postgres cannot drift; only the name/image/cap differ.
*/}}
{{- if include "cv.role.tenants" . }}
{{- include "cv.capabilityBounds" (dict
      "ctx" $
      "name" "garage"
      "image" $.Values.tenant.capabilities.garage.image
      "maxPerVolume" $.Values.tenant.storage.maxPerVolume) }}
{{- end }}
