{{/*
  Per-project Postgres bounds. Fires only on StatefulSets labeled
  corpo-valley.com/managed=postgres (set by the projects-argocd controller).
  All rules live in the shared cv.capabilityBounds helper (_helpers.tpl) so
  Postgres and Garage cannot drift; only the name/image/cap differ.
*/}}
{{- if include "cv.role.tenants" . }}
{{- include "cv.capabilityBounds" (dict
      "ctx" $
      "name" "postgres"
      "image" $.Values.tenant.capabilities.postgres.image
      "maxPerVolume" $.Values.tenant.storage.maxPerVolume) }}
{{- end }}
