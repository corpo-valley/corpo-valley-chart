# Corpo Valley Helm chart — defaults.
#
# These reproduce the current corpo-valley.com deployment when used unchanged.
# Override what you need in your own values file; everything has a sensible
# default so the chart can run with only the required sealed-secrets in place.
#
# See README.md for the install flow.
# ----------------------------------------------------------------------------

# Deployment role.
#
# Phase 1: only "all-in-one" renders fully. The "platform" / "tenants" modes
# scaffold a future cluster split where the projects-argocd controller on the
# platform cluster targets a separate tenants cluster. Until that lift is done,
# leave this on all-in-one.
role: all-in-one  # all-in-one | platform | tenants

# Base domain. Drives every default host below.
domain: corpo-valley.com

# Per-host overrides. Empty values fall back to "<key>.<domain>".
hosts:
  portal: ""
  auth: ""
  oauth: ""
  gitea: ""
  mcp: ""
  # The wildcard host used by the projects subdomain. Defaults to
  # "*.projects.<domain>" — change only if your DNS structure differs.
  projectsWildcard: ""
  # Whether Oathkeeper publishes a wildcard *.<domain> Ingress.
  # Disable for tenants-only deployments that don't terminate the wildcard.
  oathkeeperWildcard: true

# Every cv-* namespace is namespacePrefix + a logical name.
# Override the prefix to coexist with another platform on the same cluster
# (e.g. "acme-" yields acme-ory, acme-portal, ...).
namespacePrefix: cv-

# Container images.
# Default produces e.g. ghcr.io/corpo-valley/corpo-valley-portal:v0.1.4.
# Images are built and published from https://github.com/corpo-valley/corpo-valley-main;
# defaults track that repo's latest GitHub Release (immutable version tags), so
# a fresh install is reproducible. Set `latest` (or a YYYYMMDD-<sha> dev tag)
# only when you deliberately want to ride main.
# Per-component tag override beats image.defaultTag.
image:
  registry: ghcr.io/corpo-valley
  prefix: corpo-valley-
  pullPolicy: IfNotPresent
  defaultTag: v0.2.0
  # Name of the imagePullSecret each workload references. Must exist in the
  # workload's namespace; the chart does NOT create it (use kubectl create
  # secret docker-registry, or a sealed secret).
  pullSecret: ghcr-pull-secret
  # Keys are the literal image/component names (they complete
  # <registry>/<prefix><name>:<tag>): portal, mcp-gateway.
  tags:
    portal: v0.2.0
    mcp-gateway: v0.2.0

# Git source the platform ArgoCD AppProject scopes child Applications to.
# Only needed if you GitOps the platform itself: point it at YOUR deployment
# repo (the one ArgoCD reconciles to keep the rendered chart in the cluster).
# NOT corpo-valley-main (image build repo) and NOT corpo-valley-chart (the
# chart is consumed via Helm, not git-synced as raw YAML). Leave empty to
# skip rendering the platform AppProject entirely — `helm install` alone
# does not require it.
git:
  platformRepoUrl: ""
  platformRepoBranch: main

# Cloudflare tunnel. The tunnel ID + creds JSON are supplied via a sealed
# secret named "cloudflare-tunnel-credentials" — the chart only renders the
# Deployment that mounts it.
cloudflare:
  tunnelName: corpo-valley-cluster

# Email / SMTP.
# Kratos picks up COURIER_SMTP_CONNECTION_URI from the sealed "kratos-smtp"
# secret; here you only configure the visible from-line.
email:
  fromAddress: noreply@dev.cobl.io
  fromName: Corpo Valley

# Authentication options.
auth:
  # "Login with Google" — Workspace-domain-restricted Google sign-in + signup.
  # When enabled:
  #   - Kratos gains a `google` OIDC provider. Client id/secret come from the
  #     sealed secret `kratos-google-oidc` (generate-secrets.sh
  #     --google-client-id/--google-client-secret), mounted as a second Kratos
  #     config file so the secret never lands in a ConfigMap.
  #   - Self-service registration turns ON, restricted to the oidc method:
  #     the data-mapper rejects accounts outside allowedDomains (and
  #     unverified emails), and password/code signups are rejected by the
  #     portal's deny webhook. New Workspace users are auto-provisioned as
  #     full members at first login (bot identity + Gitea account).
  #   - The portal login page shows ONLY the Google button. The password/code
  #     form stays reachable at /login?method=password — VERIFY that
  #     break-glass path works for an admin account before relying on Google
  #     exclusively.
  # Google Cloud setup: OAuth client (web), redirect URI
  #   https://<hosts.auth>/self-service/methods/oidc/callback/google
  google:
    enabled: false
    # Google Workspace domains whose members may sign in / sign up (the `hd`
    # claim). REQUIRED when enabled — there is no "any Google account" mode.
    allowedDomains: []

# Persistent storage.
# Set className to the RWO storage class your cluster ships with:
#   - microk8s-hostpath (current corpo-valley.com deploy)
#   - hcloud-volumes (Hetzner)
#   - "" = use cluster default
storage:
  className: ""
  # Per-StatefulSet StorageClass override for ory-postgres. Leave unset to inherit
  # storage.className. Set to "" to omit storageClassName entirely (the cluster
  # default binds) — needed when adopting a pre-chart ory-postgres whose live
  # volumeClaimTemplate has an empty (immutable) storageClassName while you still
  # want an explicit storage.className for everything else.
  # oryPostgresClassName: ""
  oryPostgres: 5Gi
  gitea: 10Gi
  registry: 50Gi

# Per-project blob storage (Garage, S3-compatible).
# The portal provisions an optional per-project Garage StatefulSet — the blob
# analog of the per-project Postgres "database" capability. It reuses
# storage.className for the PVC; only the image pin and PVC cap live here.
# garageImage MUST match the pin enforced by the cv-projects-garage-bounds VAP
# (the portal receives it as CV_GARAGE_IMAGE), or the generated StatefulSet is
# denied at admission.
blob:
  # Pinned; built from corpo-valley-main containers/garage.
  garageImage: "ghcr.io/corpo-valley/corpo-valley-garage:v1.0.1"
  # Per-project Garage PVC cap (must match the VAP).
  storageMax: "10Gi"

# Ingress controller class.
ingress:
  className: nginx
  commonAnnotations: {}

# Cluster CIDRs.
# Consumed by the portal when it emits per-project egress NetworkPolicies.
# These MUST match the live cluster's pod/service/node ranges or the egress
# baseline will break.
cluster:
  podCIDR: 10.1.0.0/16
  serviceCIDR: 10.152.183.0/24
  nodeCIDR: 192.168.87.0/24
  sealedSecretsControllerUrl: http://sealed-secrets-controller.kube-system.svc.cluster.local:8080/v1/cert.pem
  # SPKI sha256 pin of the sealed-secrets controller cert. REQUIRED for
  # project-secret sealing: the portal runs NODE_ENV=production and refuses
  # trust-on-first-use without an explicit pin. Get it after the controller
  # is up:   ./scripts/print-cert-pin.sh
  sealedSecretsCertSha256: ""

# Resources for each platform component (mirror the current deploy).
resources:
  oryPostgres:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  kratos:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 250m, memory: 256Mi }
  hydra:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 250m, memory: 256Mi }
  keto:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }
  oathkeeper:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  portal:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 250m, memory: 256Mi }
  gitea:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 1Gi }
  giteaRunnerActRunner:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1, memory: 1Gi }
  giteaRunnerDind:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 2, memory: 2Gi }
  registry:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  mcpGateway:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 250m, memory: 128Mi }
  cloudflared:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 100m, memory: 128Mi }

# Replicas per stateless component.
#
# Stateful components (ory-postgres, gitea, registry) are pinned to 1 because
# they hold local state on RWO storage and have no built-in replication.
# Scaling them requires real HA work — see SCALING.md.
#
# Kratos caveat: every replica runs the courier worker (`--watch-courier`),
# which uses a Postgres row lock to dedupe. Safe but inefficient with N > 1;
# for proper separation split into a dedicated courier Deployment (Phase 2).
scale:
  kratos: 1
  hydra: 1
  keto: 1
  oathkeeper: 1
  portal: 1
  mcpGateway: 1
  giteaRunner: 1
  cloudflared: 1

# ArgoCD configuration.
argocd:
  # The projects ArgoCD is a second ArgoCD instance dedicated to per-project
  # Applications. In role=all-in-one it runs on the same cluster; in
  # role=platform it targets the tenants cluster.
  projectsArgocd:
    enabled: true
    nsLogical: projects-argocd    # final ns is namespacePrefix + this
    appProject: projects
  # Hydra clients that skip the consent screen. claude-code-mcp is the client
  # MCP tooling (Claude Code / Cursor / Codex) uses to drive the MCP server.
  trustedClientIds: argocd,gitea,claude-code-mcp
  disableSubmoduleInit: true

# MCP gateway. publicUrl defaults to https://<hosts.mcp>.
mcp:
  publicUrl: ""
  # RFC 8707 audience binding. Deliberately OFF: common MCP clients (Claude
  # Code, Cursor, Codex) don't send resource indicators yet, so their tokens
  # arrive with an empty `aud` and enforcement would break every connect.
  # The non-bypassable backstop still applies either way — a token naming a
  # DIFFERENT resource is always rejected — and per-project gateways always
  # verify project ownership per request. Flip to true once your clients are
  # confirmed sending resource indicators.
  enforceAudience: false
  # OAuth clients whose tokens the MCP endpoints refuse (confused-deputy
  # guard: first-party SSO clients skip consent, so their tokens carry the
  # user's identity and must not be replayable against MCP). Deliberately
  # NOT the same set as argocd.trustedClientIds: claude-code-mcp is trusted
  # for consent AND is the client MCP tooling uses — denying it would break
  # the static-client MCP path. Wired to both the portal and the mcp-gateway
  # so the two enforce identically.
  denyClientIds: argocd,gitea

# Phase-2 placeholders kept so values files stay forward-compatible.
backups:
  enabled: false
