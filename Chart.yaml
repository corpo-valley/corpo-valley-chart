apiVersion: v2
name: corpo-valley
description: |
  Corpo Valley platform — a parameterized Helm chart for the single-tenant
  platform that abstracts code + infra so non-technical users can drive Claude
  Code safely. Renders the Ory identity stack, the portal, Gitea, dual ArgoCD,
  registry, MCP gateway, and the per-project bounds (VAPs / AppProjects /
  NetworkPolicies).

  Platform images are built from github.com/corpo-valley/corpo-valley-main and
  published to ghcr.io/corpo-valley/corpo-valley-*. This chart references them
  via values but does not require any source from the build repo.

  Phase 1 ships `role: all-in-one` — one cluster, single platform instance.
  The `role: platform` / `role: tenants` modes are scaffolded for a future
  platform/tenants cluster split but are not yet rendered by this version.

type: application
version: 0.5.0
appVersion: "v0.1.4"

home: https://github.com/corpo-valley/corpo-valley-main
sources:
  - https://github.com/corpo-valley/corpo-valley-main
  - https://github.com/corpo-valley/corpo-valley-chart

maintainers:
  - name: corpo-valley
    url: https://github.com/corpo-valley

keywords:
  - ory
  - kratos
  - hydra
  - argocd
  - gitops
  - mcp
  - claude-code

annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: the legacy ALPHA/BETA/EVERYONE tier hierarchy is retired — roles are now just admin vs user (the groups:ADMIN#members Keto tuple, unchanged, so existing admins keep working); the tier-hierarchy seed Job and gitea's decorative BETA access grant are removed, and stale tier tuples in older deployments are ignored
    - kind: removed
      description: bootstrap-keto-group-hierarchy and register-gitea-keto-access PostSync Jobs
    - kind: changed
      description: default image tags bumped to the upstream v0.1.4 release (admin/user role model in the portal)
    - kind: added
      description: storage.className is now injected into the portal as CV_STORAGE_CLASS so per-project Postgres PVCs use the deployment's storage class instead of the hardcoded microk8s-hostpath (empty = cluster default)
