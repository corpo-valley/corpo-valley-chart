apiVersion: v2
name: corpo-valley
description: |
  Corpo Valley platform — a parameterized Helm chart for the single-tenant
  platform that abstracts code + infra so non-technical users can drive Claude
  Code safely. Renders the Ory identity stack, the portal, Gitea, dual ArgoCD,
  registry, MCP gateway, and the per-project bounds (VAPs / AppProjects /
  NetworkPolicies).

  Platform images are built from github.com/corpo-valley/corpo-valley-main and
  published to ghcr.io/corpo-valley/corpo-valley-*. This chart references them
  via values but does not require any source from the build repo.

  Phase 1 ships `role: all-in-one` — one cluster, single platform instance.
  The `role: platform` / `role: tenants` modes are scaffolded for a future
  platform/tenants cluster split but are not yet rendered by this version.

type: application
version: 0.6.0
appVersion: "v0.2.0"

home: https://github.com/corpo-valley/corpo-valley-main
sources:
  - https://github.com/corpo-valley/corpo-valley-main
  - https://github.com/corpo-valley/corpo-valley-chart

maintainers:
  - name: corpo-valley
    url: https://github.com/corpo-valley

keywords:
  - ory
  - kratos
  - hydra
  - argocd
  - gitops
  - mcp
  - claude-code

annotations:
  artifacthub.io/changes: |
    - kind: added
      description: Login with Google (auth.google.enabled / allowedDomains) — Workspace-domain-restricted OIDC sign-in + auto-provisioning, gated inside Kratos by a data-mapper; client id/secret and the registration webhook secret live in the kratos-google-oidc sealed config fragment, never a ConfigMap
    - kind: added
      description: per-project site access control — the portal /access/site gate injects the trusted X-CV-User-Id / X-CV-User-Email / X-CV-Perm headers at the ingress edge; project repos are kept private and member access is granted as Gitea collaborators
    - kind: added
      description: post-install now provisions the projects-argocd → Gitea repo credential (a read-only repo-creds template) so ArgoCD can clone the always-private project repos
    - kind: changed
      description: MCP deny-list wired explicitly to both portal and mcp-gateway (mcp.denyClientIds); per-project MCP access mirrors site permissions
    - kind: fixed
      description: gitea web UI no longer redirect-loops to /login (the unsatisfiable services:gitea#access Keto check is replaced by the Kratos session gate); cv-ory→portal:3000 netpol scoped to Kratos pods; the project-ingress auth-url VAP is slug-bound by exact match
    - kind: security
      description: generate-secrets.sh hardened (umask 077, --google-client-secret-file); OIDC data-mapper binds the imported email's domain to allowedDomains
    - kind: changed
      description: default image tags bumped to the upstream v0.2.0 release
