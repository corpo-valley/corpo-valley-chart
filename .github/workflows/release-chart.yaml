# Publish versioned Helm chart releases.
#
# On a push to `main` that touches a chart, helm/chart-releaser-action packages
# each chart under `charts/<name>/` whose Chart.yaml version isn't released yet,
# creates a GitHub Release named `<chart>-<version>` with the `.tgz` attached,
# and updates the Helm repo index (`index.yaml`) on the `gh-pages` branch — which
# makes this repo an installable Helm repository:
#
#   helm repo add corpo-valley https://corpo-valley.github.io/corpo-valley-chart
#   helm install corpo-valley corpo-valley/corpo-valley -f my-values.yaml
#
# Releasing a new version is therefore just: bump `charts/corpo-valley/Chart.yaml`
# `version:` and merge to main. Versions that already have a release are skipped,
# so re-running is safe.
#
# ONE-TIME SETUP after this first lands and the workflow has run once: enable
# GitHub Pages in repo settings with Source = branch `gh-pages` / `(root)`.
name: Release Chart

on:
  push:
    branches: [main]
    paths:
      - 'charts/**'

permissions:
  contents: write   # create GitHub Releases + push the index to gh-pages

# Never let two release runs race the gh-pages index.
concurrency:
  group: release-chart
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — chart-releaser diffs tags)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@a0d2dc62c5e491af8ef6ba64a2e02bcf3fb33aa1 # v1.7.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # charts_dir defaults to 'charts'
