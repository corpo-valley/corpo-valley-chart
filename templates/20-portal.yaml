{{- if include "cv.role.platform" . }}
{{- $ns := include "cv.ns" (list $ "portal") }}
{{- $oryNs := include "cv.ns" (list $ "ory") }}
{{- $giteaNs := include "cv.ns" (list $ "gitea") }}
{{- $projectsArgocdNs := include "cv.ns" (list $ $.Values.argocd.projectsArgocd.nsLogical) }}
{{- $portalHost := include "cv.host" (list $ "portal") }}
{{- $authHost := include "cv.host" (list $ "auth") }}
{{- $oauthHost := include "cv.host" (list $ "oauth") }}
{{- $mcpHost := include "cv.host" (list $ "mcp") }}
{{- $mcpPublicUrl := $.Values.mcp.publicUrl | default (printf "https://%s" $mcpHost) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: portal
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: portal-projects-app-manager
  namespace: {{ $projectsArgocdNs }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: portal-projects-app-manager
  namespace: {{ $projectsArgocdNs }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: portal
    namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: portal-projects-app-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cv-projects-reader
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps", "persistentvolumeclaims", "events", "replicationcontrollers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portal-projects-reader
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: portal
    namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cv-projects-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cv-projects-postgres-pvc-deleter
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    resourceNames: ["data-postgres-0"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portal-projects-postgres-pvc-deleter
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: portal
    namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cv-projects-postgres-pvc-deleter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cv-projects-pod-restarter
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portal-projects-pod-restarter
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: portal
    namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cv-projects-pod-restarter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cv-projects-namespace-deleter
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portal-projects-namespace-deleter
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: portal
    namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cv-projects-namespace-deleter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cv-projects-namespace-provisioner
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "patch"]
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["create"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portal-projects-namespace-provisioner
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: portal
    namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cv-projects-namespace-provisioner
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
    app: portal
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      serviceAccountName: portal
      imagePullSecrets:
        - name: {{ $.Values.image.pullSecret }}
      containers:
        - name: portal
          image: {{ include "cv.image" (list $ "portal") }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: KRATOS_PUBLIC_URL
              value: http://{{ include "cv.svc" (list $ "ory-kratos-public" "ory") }}:4433
            - name: KRATOS_BROWSER_URL
              value: https://{{ $authHost }}
            - name: KRATOS_ADMIN_URL
              value: http://{{ include "cv.svc" (list $ "ory-kratos-admin" "ory") }}:4434
            - name: HYDRA_ADMIN_URL
              value: http://{{ include "cv.svc" (list $ "ory-hydra-admin" "ory") }}:4445
            - name: HYDRA_PUBLIC_URL
              value: https://{{ $oauthHost }}
            - name: KETO_READ_URL
              value: http://{{ include "cv.svc" (list $ "ory-keto-read" "ory") }}:4466
            - name: KETO_WRITE_URL
              value: http://{{ include "cv.svc" (list $ "ory-keto-write" "ory") }}:4467
            - name: BASE_URL
              value: https://{{ $portalHost }}
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: portal-db, key: DATABASE_URL } }
            - name: GITEA_URL
              valueFrom: { secretKeyRef: { name: gitea-admin, key: GITEA_URL } }
            - name: GITEA_ADMIN_USER
              valueFrom: { secretKeyRef: { name: gitea-admin, key: GITEA_ADMIN_USER } }
            - name: GITEA_ADMIN_TOKEN
              valueFrom: { secretKeyRef: { name: gitea-admin, key: GITEA_ADMIN_TOKEN } }
            - name: GITEA_INTERNAL_URL
              value: http://{{ include "cv.svc" (list $ "gitea" "gitea") }}
            - name: CV_PROJECTS_ARGOCD_NAMESPACE
              value: {{ $projectsArgocdNs }}
            - name: CV_PROJECTS_APPPROJECT
              value: {{ $.Values.argocd.projectsArgocd.appProject | quote }}
            - name: PUBLIC_MCP_URL
              value: {{ $mcpPublicUrl }}
            - name: TRUSTED_CLIENT_IDS
              value: {{ $.Values.argocd.trustedClientIds | quote }}
            - name: PROJECTS_DOMAIN
              value: {{ include "cv.projectsHostSuffix" $ }}
            - name: CV_POD_CIDR
              value: {{ $.Values.cluster.podCIDR | quote }}
            - name: CV_SERVICE_CIDR
              value: {{ $.Values.cluster.serviceCIDR | quote }}
            - name: CV_NODE_CIDR
              value: {{ $.Values.cluster.nodeCIDR | quote }}
            - name: SEALED_SECRETS_CONTROLLER_URL
              value: {{ $.Values.cluster.sealedSecretsControllerUrl | quote }}
          resources:
            {{- toYaml $.Values.resources.portal | nindent 12 }}
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
    app: portal
spec:
  selector:
    app: portal
  ports:
    - { protocol: TCP, port: 80, targetPort: 3000 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
    app: portal
  {{- with $.Values.ingress.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  rules:
    - host: {{ $portalHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: portal, port: { number: 80 } } }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal-mcp
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
    app: portal
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    {{- with $.Values.ingress.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  rules:
    - host: {{ $mcpHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: portal, port: { number: 80 } } }
---
# DCR discovery shim — Exact paths beat the catch-all on the Hydra Ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal-oauth-dcr-shim
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
    app: portal
  {{- with $.Values.ingress.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  rules:
    - host: {{ $oauthHost }}
      http:
        paths:
          - path: /.well-known/oauth-authorization-server
            pathType: Exact
            backend: { service: { name: portal, port: { number: 80 } } }
          - path: /.well-known/openid-configuration
            pathType: Exact
            backend: { service: { name: portal, port: { number: 80 } } }
{{- end }}
