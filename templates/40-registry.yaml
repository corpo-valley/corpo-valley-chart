{{- if include "cv.role.platform" . }}
{{- $ns := include "cv.ns" (list $ "registry") }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if $.Values.storage.className }}
  storageClassName: {{ $.Values.storage.className }}
  {{- end }}
  resources:
    requests:
      storage: {{ $.Values.storage.registry }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
    app: registry
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:2.8.3
          ports:
            - { name: registry, containerPort: 5000 }
          env:
            - { name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY, value: /var/lib/registry }
            - { name: REGISTRY_STORAGE_DELETE_ENABLED, value: "true" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/registry }
          resources:
            {{- toYaml $.Values.resources.registry | nindent 12 }}
          livenessProbe:
            httpGet: { path: /v2/, port: 5000 }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /v2/, port: 5000 }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
    app: registry
spec:
  selector:
    app: registry
  ports:
    - { name: registry, port: 5000, targetPort: 5000 }
{{- end }}
