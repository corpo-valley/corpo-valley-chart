{{/*
  Per-project Postgres bounds. Fires only on StatefulSets labeled
  corpo-valley.com/managed=postgres (set by the projects-argocd controller).
*/}}
{{- if include "cv.role.tenants" . }}
{{- $projectsArgocdNs := include "cv.ns" (list $ $.Values.argocd.projectsArgocd.nsLogical) }}
{{- $controllerSa := printf "system:serviceaccount:%s:argocd-application-controller" $projectsArgocdNs }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: cv-projects-postgres-bounds
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["statefulsets"]
  matchConditions:
    - name: only-projects-argocd-controller
      expression: "request.userInfo.username == '{{ $controllerSa }}'"
    - name: only-managed-postgres
      expression: "has(object.metadata.labels) && 'corpo-valley.com/managed' in object.metadata.labels && object.metadata.labels['corpo-valley.com/managed'] == 'postgres'"
  validations:
    - expression: "has(object.spec.replicas) && object.spec.replicas == 1"
      message: "Project-managed Postgres must have replicas: 1 (HA not supported on this tier)."
    - expression: "object.spec.template.spec.containers.size() == 1"
      message: "Project-managed Postgres pod must have exactly one container (no sidecars on this tier)."
    - expression: "object.spec.template.spec.containers.all(c, c.image == 'postgres:16-alpine' || c.image == 'postgres:15-alpine')"
      message: "Project-managed Postgres image must be postgres:16-alpine or postgres:15-alpine (image pinning gate)."
    - expression: "object.spec.template.spec.containers.all(c, !has(c.securityContext) || !has(c.securityContext.privileged) || c.securityContext.privileged == false)"
      message: "Project-managed Postgres containers must not be privileged."
    - expression: "object.spec.template.spec.containers.all(c, !has(c.securityContext) || !has(c.securityContext.allowPrivilegeEscalation) || c.securityContext.allowPrivilegeEscalation == false)"
      message: "Project-managed Postgres containers must not allowPrivilegeEscalation."
    - expression: "has(object.spec.template.spec.securityContext) && has(object.spec.template.spec.securityContext.runAsNonRoot) && object.spec.template.spec.securityContext.runAsNonRoot == true"
      message: "Project-managed Postgres must set pod securityContext.runAsNonRoot=true."
    - expression: "object.spec.template.spec.containers.all(c, has(c.securityContext) && has(c.securityContext.capabilities) && has(c.securityContext.capabilities.drop) && c.securityContext.capabilities.drop.exists(d, d == 'ALL'))"
      message: "Project-managed Postgres containers must drop ALL capabilities."
    - expression: "!has(object.spec.template.spec.hostNetwork) || object.spec.template.spec.hostNetwork == false"
      message: "Project-managed Postgres must not use hostNetwork."
    - expression: "!has(object.spec.template.spec.hostPID) || object.spec.template.spec.hostPID == false"
      message: "Project-managed Postgres must not use hostPID."
    - expression: "!has(object.spec.template.spec.hostIPC) || object.spec.template.spec.hostIPC == false"
      message: "Project-managed Postgres must not use hostIPC."
    - expression: "!has(object.spec.template.spec.volumes) || object.spec.template.spec.volumes.all(v, !has(v.hostPath))"
      message: "Project-managed Postgres must not mount hostPath volumes."
    - expression: "object.spec.volumeClaimTemplates.all(t, !quantity(t.spec.resources.requests.storage).isGreaterThan(quantity('10Gi')))"
      message: "Project-managed Postgres storage must be <= 10Gi (per-tenant quota)."
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: cv-projects-postgres-bounds
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
spec:
  policyName: cv-projects-postgres-bounds
  validationActions: [Deny]
{{- end }}
