{{- if include "cv.role.platform" . }}
{{- $ns := include "cv.ns" (list $ "ory") }}
{{- $portalHost := include "cv.host" (list $ "portal") }}
{{- $authHost := include "cv.host" (list $ "auth") }}
{{- $hydraAdmin := include "cv.svc" (list $ "ory-hydra-admin" "ory") }}
{{- $portalSvc := include "cv.svc" (list $ "portal" "portal") }}
{{- $google := $.Values.auth.google }}
{{- if and $google.enabled (not $google.allowedDomains) }}
{{- fail "auth.google.enabled requires auth.google.allowedDomains (at least one Workspace domain)" }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ory-kratos-config
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
    app: ory-kratos
data:
  kratos.yaml: |
    version: v1.3.0

    serve:
      public:
        base_url: https://{{ $authHost }}
        cors:
          enabled: true
          allowed_origins:
            - https://{{ $portalHost }}
            - {{ include "cv.corsWildcard" $ }}
          allowed_methods: [GET, POST, PUT, PATCH, DELETE]
          allowed_headers: [Authorization, Content-Type, Cookie]
          exposed_headers: [Set-Cookie]
          allow_credentials: true
      admin:
        base_url: http://ory-kratos-admin:4434

    selfservice:
      default_browser_return_url: https://{{ $portalHost }}/
      allowed_return_urls:
        - https://{{ $portalHost }}
        - {{ include "cv.corsWildcard" $ }}

      methods:
        password:
          enabled: true
        code:
          enabled: true
          passwordless_enabled: true
        link:
          enabled: true
        {{- if $google.enabled }}
        # "Login with Google" (auth.google.enabled). The provider list — which
        # carries the OAuth client secret — lives in the sealed secret
        # kratos-google-oidc, mounted as a SECOND config file (see the
        # container args); only the toggle and the domain-restricting data
        # mapper (below) live in this ConfigMap.
        oidc:
          enabled: true
        {{- end }}
        # Self-service profile editing is DISABLED: users must not change their
        # own traits (email / username / name) — only an admin can, via the admin
        # API (portal /admin/users). With this off, the settings flow offers only
        # the password method; a direct POST of `method=profile` to the settings
        # flow is rejected. The admin API (patchIdentity) is unaffected.
        profile:
          enabled: false

      flows:
        login:
          ui_url: https://{{ $portalHost }}/login
          lifespan: 10m
        {{- if $google.enabled }}
        registration:
          # Registration is ON solely for Google Workspace signup. The oidc
          # data mapper rejects accounts outside auth.google.allowedDomains;
          # password/code registrations are rejected by the portal deny
          # webhook below (the portal UI never offers them, this closes the
          # direct-Kratos-API path). One-step keeps the method set
          # deterministic. After a successful Google signup the portal
          # provisioning webhook creates the .bot identity + Gitea account
          # (response.ignore — it never blocks or fails the signup).
          enabled: true
          enable_legacy_one_step: true
          ui_url: https://{{ $portalHost }}/registration
          lifespan: 10m
          after:
            # The oidc after-hooks (session + the provisioning web_hook) live in
            # the kratos-google-oidc sealed-secret config fragment, merged via the
            # second --config file. The web_hook there carries an X-Internal-Secret
            # header so the portal can AUTHENTICATE the call (finding F3) — keeping
            # that secret out of this ConfigMap is why the hook isn't here. The
            # password/code deny hooks below need no secret (they only ever 403).
            password:
              hooks:
                - hook: web_hook
                  config:
                    url: http://{{ $portalSvc }}/internal/hooks/registration/deny
                    method: POST
                    body: {{ printf "base64://%s" (b64enc "function(ctx) {}") }}
                    can_interrupt: true
            code:
              hooks:
                - hook: web_hook
                  config:
                    url: http://{{ $portalSvc }}/internal/hooks/registration/deny
                    method: POST
                    body: {{ printf "base64://%s" (b64enc "function(ctx) {}") }}
                    can_interrupt: true
        {{- else }}
        registration:
          # Self-service registration is DISABLED — accounts are created only by
          # an admin (portal /admin/users), which provisions the paired .bot
          # identity + Gitea accounts synchronously. The first admin is
          # bootstrapped post-install (see scripts/bootstrap-admin.sh). Flip
          # auth.google.enabled to allow Workspace-domain Google signup.
          enabled: false
          ui_url: https://{{ $portalHost }}/login
          lifespan: 10m
        {{- end }}
        verification:
          ui_url: https://{{ $portalHost }}/verification
          enabled: true
          lifespan: 720h
        recovery:
          ui_url: https://{{ $portalHost }}/recovery
          enabled: true
        error:
          ui_url: https://{{ $portalHost }}/error
        settings:
          ui_url: https://{{ $portalHost }}/settings
          privileged_session_max_age: 15m

    session:
      cookie:
        domain: {{ $.Values.domain }}
        same_site: Lax
      lifespan: 720h
      earliest_possible_extend: 168h

    cookies:
      domain: {{ $.Values.domain }}
      same_site: Lax

    identity:
      default_schema_id: person
      schemas:
        - id: person
          url: file:///etc/kratos/schemas/person.schema.json

    oauth2_provider:
      url: http://{{ $hydraAdmin }}:4445

    courier:
      smtp:
        connection_uri: smtp://localhost:25/?disable_starttls=true
        from_address: {{ $.Values.email.fromAddress }}
        from_name: {{ $.Values.email.fromName | quote }}

{{- if $google.enabled }}
  # Data mapper for the google OIDC provider (referenced by mapper_url in the
  # kratos-google-oidc secret config). THE domain gate: it runs inside Kratos
  # on every Google signup/login, so it can't be bypassed by skipping the
  # portal UI. Rejects unverified emails and any account whose Workspace `hd`
  # claim isn't in auth.google.allowedDomains (personal gmail has no hd claim
  # → rejected). Google attests email_verified, so the address is imported as
  # verified — the member can provision immediately (requireVerifiedEmail).
  oidc.google.data-mapper.jsonnet: |
    local claims = std.extVar('claims');
    local allowed = [{{- range $i, $d := $google.allowedDomains }}{{ if $i }}, {{ end }}{{ $d | quote }}{{- end }}];
    // Domain of the email itself (lazy — only forced once email presence is
    // confirmed below). allowedDomains are lowercase hostnames (schema-validated).
    local emailDomain = std.asciiLower(std.split(claims.email, '@')[1]);
    // email_verified is a JSON bool from Google; compare to `true` explicitly so
    // a stringified "false" from a non-conformant IdP can't read as truthy.
    if !std.objectHas(claims, 'email') || !std.objectHas(claims, 'email_verified') || claims.email_verified != true then
      error 'Your Google account email is not verified.'
    else if !std.objectHas(claims, 'hd') || !std.member(allowed, claims.hd) then
      error 'This Google account is not in an allowed Workspace domain.'
    // Bind the IMPORTED (and verified) email to the allow-list too, not just the
    // hd claim: a multi-domain Workspace can present an email in a different
    // domain than hd, and that address is imported as verified — it must itself
    // be in an allowed domain (finding F9 hardening).
    else if !std.member(allowed, emailDomain) then
      error 'Your Google account email is not in an allowed Workspace domain.'
    else
      {
        identity: {
          traits: {
            email: claims.email,
            [if std.objectHas(claims, 'given_name') || std.objectHas(claims, 'family_name') then 'name']: {
              [if std.objectHas(claims, 'given_name') then 'first']: claims.given_name,
              [if std.objectHas(claims, 'family_name') then 'last']: claims.family_name,
            },
          },
          verified_addresses: [
            { via: 'email', value: claims.email },
          ],
        },
      }
{{- end }}
  person.schema.json: |
    {
      "$id": "https://schemas.{{ $.Values.domain }}/person.schema.json",
      "$schema": "http://json-schema.org/draft-07/schema#",
      "title": "Person",
      "type": "object",
      "properties": {
        "traits": {
          "type": "object",
          "properties": {
            "email": {
              "type": "string",
              "format": "email",
              "title": "Email",
              "ory.sh/kratos": {
                "credentials": {
                  "password": { "identifier": true },
                  "code": { "identifier": true, "via": "email" }
                },
                "verification": { "via": "email" },
                "recovery": { "via": "email" }
              }
            },
            "name": {
              "type": "object",
              "properties": {
                "first": { "type": "string", "title": "First Name" },
                "last": { "type": "string", "title": "Last Name" }
              }
            },
            "preferred_username": {
              "type": "string",
              "title": "Username",
              "minLength": 1,
              "maxLength": 64,
              "pattern": "^[a-zA-Z0-9._-]+$"
            }
          },
          "required": ["email"],
          "additionalProperties": false
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ory-kratos
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
    app: ory-kratos
spec:
  # NOTE: every replica runs --watch-courier (see args below). With scale.kratos > 1
  # the courier workers race on the Postgres outbox; safe but inefficient. For HA
  # courier, run scale.kratos: 1 here and a separate dedicated-courier deployment.
  replicas: {{ $.Values.scale.kratos | default 1 }}
  selector:
    matchLabels:
      app: ory-kratos
  template:
    metadata:
      labels:
        app: ory-kratos
      annotations:
        # Restart the pod whenever the mounted Kratos config changes.
        config-revision: "2026-06-12-google-oidc{{ if $google.enabled }}-on{{ end }}"
    spec:
      imagePullSecrets:
        - name: {{ $.Values.image.pullSecret }}
      initContainers:
        - name: kratos-migrate
          image: oryd/kratos:v1.3.0
          args: [migrate, sql, -e, --yes, --config, /etc/kratos/config/kratos.yaml]
          env:
            - name: DSN
              valueFrom:
                secretKeyRef: { name: ory-db-credentials, key: DSN_KRATOS }
            - name: SECRETS_COOKIE
              valueFrom:
                secretKeyRef: { name: ory-kratos-secrets, key: SECRETS_COOKIE }
            - name: SECRETS_CIPHER
              valueFrom:
                secretKeyRef: { name: ory-kratos-secrets, key: SECRETS_CIPHER }
          volumeMounts:
            - { name: config, mountPath: /etc/kratos/config }
            - { name: schemas, mountPath: /etc/kratos/schemas }
      containers:
        - name: kratos
          image: oryd/kratos:v1.3.0
          # With Google login enabled, a SECOND config file (from the sealed
          # secret kratos-google-oidc) merges in the oidc provider list —
          # keeping the OAuth client secret out of the ConfigMap.
          args: [serve, all, --watch-courier, --config, /etc/kratos/config/kratos.yaml{{- if $google.enabled }}, --config, /etc/kratos/google-oidc/google-oidc.yaml{{- end }}]
          ports:
            - { name: public, containerPort: 4433 }
            - { name: admin,  containerPort: 4434 }
          env:
            - name: DSN
              valueFrom:
                secretKeyRef: { name: ory-db-credentials, key: DSN_KRATOS }
            - name: SECRETS_COOKIE
              valueFrom:
                secretKeyRef: { name: ory-kratos-secrets, key: SECRETS_COOKIE }
            - name: SECRETS_CIPHER
              valueFrom:
                secretKeyRef: { name: ory-kratos-secrets, key: SECRETS_CIPHER }
            - name: COURIER_SMTP_CONNECTION_URI
              valueFrom:
                secretKeyRef: { name: kratos-smtp, key: COURIER_SMTP_CONNECTION_URI }
          volumeMounts:
            - { name: config, mountPath: /etc/kratos/config }
            - { name: schemas, mountPath: /etc/kratos/schemas }
            {{- if $google.enabled }}
            - { name: google-oidc, mountPath: /etc/kratos/google-oidc, readOnly: true }
            {{- end }}
          resources:
            {{- toYaml $.Values.resources.kratos | nindent 12 }}
          livenessProbe:
            httpGet: { path: /health/alive, port: 4433 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health/ready, port: 4433 }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: ory-kratos-config
            items:
              - { key: kratos.yaml, path: kratos.yaml }
              {{- if $google.enabled }}
              - { key: oidc.google.data-mapper.jsonnet, path: oidc.google.data-mapper.jsonnet }
              {{- end }}
        - name: schemas
          configMap:
            name: ory-kratos-config
            items:
              - { key: person.schema.json, path: person.schema.json }
        {{- if $google.enabled }}
        - name: google-oidc
          secret:
            secretName: kratos-google-oidc
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: ory-kratos-public
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
    app: ory-kratos
    component: public
spec:
  selector:
    app: ory-kratos
  ports:
    - { protocol: TCP, port: 4433, targetPort: 4433 }
---
apiVersion: v1
kind: Service
metadata:
  name: ory-kratos-admin
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
    app: ory-kratos
    component: admin
spec:
  selector:
    app: ory-kratos
  ports:
    - { protocol: TCP, port: 4434, targetPort: 4434 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ory-kratos
  namespace: {{ $ns }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
    app: ory-kratos
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    {{- with $.Values.ingress.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  rules:
    - host: {{ $authHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ory-kratos-public
                port:
                  number: 4433
{{- end }}
