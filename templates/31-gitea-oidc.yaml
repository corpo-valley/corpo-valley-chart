{{/*
  Post-sync wiring between Gitea and the Ory stack: register the "gitea"
  OAuth2 client on Hydra. Idempotent (skips if the client already exists), so
  it re-runs safely after every ArgoCD sync. No Keto access tuple is needed:
  gitea is a trusted first-party client (TRUSTED_CLIENT_IDS) and services
  without an admins-only tuple are open to every signed-in user.
*/}}
{{- if include "cv.role.platform" . }}
{{- $oryNs := include "cv.ns" (list $ "ory") }}
{{- $hydraAdmin := include "cv.svc" (list $ "ory-hydra-admin" "ory") }}
{{- $giteaHost := include "cv.host" (list $ "gitea") }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: register-gitea-client
  namespace: {{ $oryNs }}
  labels:
    {{- include "cv.labels" $ | nindent 4 }}
    app: ory-hydra
    component: client-registration
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: ory-client-registration
    spec:
      imagePullSecrets:
        - name: {{ $.Values.image.pullSecret }}
      restartPolicy: Never
      containers:
        - name: register
          image: oryd/hydra:v2.3.0
          env:
            - name: HYDRA_ADMIN_URL
              value: "http://{{ $hydraAdmin }}:4445"
            - name: CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: ory-hydra-clients, key: GITEA_CLIENT_SECRET } }
          command: ["/bin/sh", "-c"]
          args:
            - |
              hydra get oauth2-client gitea --endpoint "${HYDRA_ADMIN_URL}" 2>/dev/null \
                && echo "Client 'gitea' already exists, skipping." && exit 0
              hydra create oauth2-client \
                --endpoint "${HYDRA_ADMIN_URL}" \
                --id gitea \
                --name "Gitea" \
                --secret "${CLIENT_SECRET}" \
                --grant-type authorization_code,refresh_token \
                --response-type code \
                --scope openid,profile,email,offline_access \
                --redirect-uri "https://{{ $giteaHost }}/user/oauth2/CorpoValley/callback" \
                --token-endpoint-auth-method client_secret_basic
              echo "Client 'gitea' created."
{{- end }}
